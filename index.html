<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Bacpacer</title>
    <link rel="stylesheet" href="/src/styles.css">
</head>

<body>

    <div id="app">
        <header class="app-header">
            <p class="eyebrow text-detail">Even G2 companion</p>
            <h1 class="text-large-title">Bacpacer</h1>
            <p id="subtitle" class="text-normal-body">A pace assistant for wiser drinking decisions.</p>
        </header>

        <section class="control-panel" aria-label="Quick actions">
            <div class="action-list">
                <button id="resetBtn" class="app-btn app-btn--danger" style="display:none">
                    <span class="btn-icon" aria-hidden="true">↺</span>
                    <span class="btn-label">Reset Drinks</span>
                </button>

                <button id="drinksLogBtn" class="app-btn app-btn--primary" style="display:none">
                    <span class="btn-icon" aria-hidden="true">≣</span>
                    <span class="btn-label">Drinks log</span>
                </button>

                <button id="bacSettingsBtn" class="app-btn app-btn--primary" style="display:none">
                    <span class="btn-icon" aria-hidden="true">⚙</span>
                    <span class="btn-label">BAC settings</span>
                </button>
            </div>
        </section>

        <p id="status" class="text-small-body"></p>

        <p class="panel-title text-normal-title">Event log</p>
        <textarea id="event-log" class="event-log" readonly></textarea>
    </div>

    <div id="confirmResetModal" class="modal-overlay hidden" role="dialog" aria-modal="true"
        aria-labelledby="confirmResetTitle">
        <div class="modal-card">
            <h2 id="confirmResetTitle" class="text-medium-title">Reset drink history?</h2>
            <p class="text-normal-body">This will remove all stored drink entries.</p>
            <div class="modal-actions">
                <button id="confirmResetBtn" class="danger-btn">Reset</button>
                <button id="cancelResetBtn">Cancel</button>
            </div>
        </div>
    </div>
    <div id="drinksLogModal" class="modal-overlay hidden" role="dialog" aria-modal="true"
        aria-labelledby="drinksLogTitle">
        <div class="modal-card modal-card--wide">
            <h2 id="drinksLogTitle" class="text-medium-title">Drinks log</h2>
            <div id="drinksLogList" class="drinks-log-list"></div>
            <div class="modal-actions">
                <button id="closeDrinksLogBtn">Close</button>
            </div>
        </div>
    </div>

    <div id="confirmDeleteDrinkModal" class="modal-overlay hidden" role="dialog" aria-modal="true"
        aria-labelledby="confirmDeleteDrinkTitle">
        <div class="modal-card">
            <h2 id="confirmDeleteDrinkTitle" class="text-medium-title">Delete drink?</h2>
            <p id="confirmDeleteDrinkText" class="text-normal-body">This will remove the selected drink entry.</p>
            <div class="modal-actions">
                <button id="confirmDeleteDrinkBtn" class="danger-btn">Delete</button>
                <button id="cancelDeleteDrinkBtn">Cancel</button>
            </div>
        </div>
    </div>

    <div id="editDrinkModal" class="modal-overlay hidden" role="dialog" aria-modal="true"
        aria-labelledby="editDrinkTitle">
        <div class="modal-card">
            <h2 id="editDrinkTitle" class="text-medium-title">Edit drink</h2>
            <div class="form-grid">
                <label class="field-block" for="editDrinkTimeInput">
                    <span class="field-label">Time</span>
                    <input id="editDrinkTimeInput" class="field-input" type="time" />
                </label>
                <label class="field-block" for="editDrinkMlInput">
                    <span class="field-label">Amount (ml)</span>
                    <input id="editDrinkMlInput" class="field-input" type="number" min="0" max="2000" step="25" />
                </label>
                <label class="field-block" for="editDrinkPercentInput">
                    <span class="field-label">Alcohol %</span>
                    <input id="editDrinkPercentInput" class="field-input" type="number" min="0" max="100" step="0.5" />
                </label>
            </div>
            <div class="modal-actions">
                <button id="saveEditDrinkBtn">Save</button>
                <button id="cancelEditDrinkBtn">Cancel</button>
            </div>
        </div>
    </div>

    <div id="bacSettingsModal" class="modal-overlay hidden" role="dialog" aria-modal="true"
        aria-labelledby="bacSettingsTitle">
        <div class="modal-card">
            <h2 id="bacSettingsTitle" class="text-medium-title">BAC settings</h2>
            <p id="bacEstimatePreview" class="text-normal-body"></p>
            <div class="form-grid">
                <label class="field-block" for="bacWeightKgInput">
                    <span class="field-label">Weight (kg)</span>
                    <input id="bacWeightKgInput" class="field-input" type="number" min="35" max="250" step="0.5" />
                </label>
                <label class="field-block" for="bacSexAtBirthInput">
                    <span class="field-label">Sex at birth</span>
                    <select id="bacSexAtBirthInput" class="field-input">
                        <option value="male">Male</option>
                        <option value="female">Female</option>
                    </select>
                </label>
                <label class="field-block" for="bacAgeYearsInput">
                    <span class="field-label">Age (years)</span>
                    <input id="bacAgeYearsInput" class="field-input" type="number" min="18" max="100" step="1" />
                </label>
                <label class="field-block" for="bacHeightCmInput">
                    <span class="field-label">Height (cm)</span>
                    <input id="bacHeightCmInput" class="field-input" type="number" min="130" max="230" step="1" />
                </label>
                <label class="field-block" for="bacEliminationInput">
                    <span class="field-label">Elimination rate (g/dL/h)</span>
                    <input id="bacEliminationInput" class="field-input" type="number" min="0.005" max="0.04"
                        step="0.001" />
                </label>
                <label class="field-block" for="bacAbsorptionInput">
                    <span class="field-label">Absorption minutes</span>
                    <input id="bacAbsorptionInput" class="field-input" type="number" min="0" max="240" step="1" />
                </label>
                <label class="field-block" for="bacFoodProfileInput">
                    <span class="field-label">Food profile</span>
                    <select id="bacFoodProfileInput" class="field-input">
                        <option value="empty">Empty stomach</option>
                        <option value="light">Light meal</option>
                        <option value="heavy">Heavy meal</option>
                    </select>
                </label>
                <label class="field-checkbox" for="bacUseCustomBodyWaterInput">
                    <input id="bacUseCustomBodyWaterInput" type="checkbox" />
                    <span class="field-label">Use custom body water factor</span>
                </label>
                <label class="field-block" for="bacCustomBodyWaterInput">
                    <span class="field-label">Custom body water factor (r)</span>
                    <input id="bacCustomBodyWaterInput" class="field-input" type="number" min="0.4" max="0.9"
                        step="0.01" />
                </label>
                <p id="bacBodyWaterComputedText" class="text-small-body"></p>
            </div>
            <div class="modal-actions">
                <button id="saveBacSettingsBtn">Save</button>
                <button id="cancelBacSettingsBtn">Cancel</button>
            </div>
        </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
</body>

</html>
